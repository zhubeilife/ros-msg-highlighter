<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1B2838"/>
      <stop offset="100%" stop-color="#0D1B2A"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="128" height="128" rx="18" fill="url(#bg)"/>

  <!-- Node graph: spokes from center -->
  <line x1="64" y1="52" x2="64" y2="22" stroke="#29B6F6" stroke-width="2.2" stroke-linecap="round" opacity="0.7"/>
  <line x1="53" y1="58" x2="26" y2="42" stroke="#29B6F6" stroke-width="2.2" stroke-linecap="round" opacity="0.7"/>
  <line x1="75" y1="58" x2="102" y2="42" stroke="#29B6F6" stroke-width="2.2" stroke-linecap="round" opacity="0.7"/>
  <line x1="52" y1="68" x2="22" y2="78" stroke="#29B6F6" stroke-width="2.2" stroke-linecap="round" opacity="0.5"/>
  <line x1="76" y1="68" x2="106" y2="78" stroke="#29B6F6" stroke-width="2.2" stroke-linecap="round" opacity="0.5"/>

  <!-- Outer nodes -->
  <circle cx="64" cy="19" r="5.5" fill="#4FC3F7"/>
  <circle cx="24" cy="40" r="5" fill="#4FC3F7" opacity="0.85"/>
  <circle cx="104" cy="40" r="5" fill="#4FC3F7" opacity="0.85"/>
  <circle cx="19" cy="80" r="4.5" fill="#29B6F6" opacity="0.6"/>
  <circle cx="109" cy="80" r="4.5" fill="#29B6F6" opacity="0.6"/>

  <!-- Central node -->
  <circle cx="64" cy="63" r="13" fill="#0288D1" opacity="0.95"/>
  <circle cx="64" cy="63" r="9" fill="#4FC3F7"/>

  <!-- "ROS" text -->
  <text x="64" y="97" font-family="Arial, Helvetica, sans-serif" font-size="24"
        font-weight="bold" text-anchor="middle" fill="white" letter-spacing="2">ROS</text>

  <!-- File type hint -->
  <text x="64" y="114" font-family="Arial, Helvetica, sans-serif" font-size="10"
        text-anchor="middle" fill="#4FC3F7" opacity="0.75">.msg  .srv  .action</text>
</svg>
